<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Princess Madroñero</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="contact-page">

  <nav class="navbar">
    <div class="logo"><a href="index.html">PM</a></div>
    <ul class="nav-links">
      <li><a href="about.html">About</a></li>
      <li><a href="techstack.html">Tech Stack</a></li>
      <li><a href="certifications.html">Certification</a></li>
      <li><a href="contacts.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <header class="header">
    <h1>Contact Me</h1>
    <p class="subtitle">
      If you’re interested in working together, have a project in mind, or just want to connect, feel free to reach out using the links or form below.
    </p>
  </header>

  <main class="contact-container">
    <div class="social-icons">
      <a href="https://github.com" target="_blank" class="icon github">GitHub</a>
      <a href="https://linkedin.com" target="_blank" class="icon linkedin">LinkedIn</a>
    </div>

    <form class="contact-form">
      <input type="text" name="name" placeholder="Enter your Name" required>
      <input type="email" name="email" placeholder="Enter your Email" required>
      <textarea name="message" rows="5" placeholder="Write a message" required></textarea>
      <button type="submit" class="btn">Send</button>
    </form>
  </main>

  <footer>
    <div class="footer-links">
      <a href="https://linkedin.com" target="_blank">LinkedIn</a>
      <a href="https://github.com" target="_blank">GitHub</a>
    </div>
    <p class="footer-copy">© 2026 Princess Madroñero | Portfolio</p>
  </footer>
</body>
</html>
